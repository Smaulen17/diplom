<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редактировать партнёра</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      color: #222;
    }

    .header {
      background: #1a3a5c;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 18px;
      font-weight: bold;
    }

    .header a.back-btn {
      background: transparent;
      color: white;
      text-decoration: none;
      padding: 7px 16px;
      border-radius: 4px;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .header a.back-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    .form-wrap {
      max-width: 680px;
      margin: 30px auto;
      background: white;
      border: 1px solid #ccc;
      border-top: 3px solid #1a3a5c;
    }

    .form-title {
      background: #1a3a5c;
      color: white;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-title span.id-badge {
      font-size: 11px;
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: normal;
    }

    .form-body {
      padding: 20px;
    }

    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-bottom: 14px;
    }

    .form-group.no-mb {
      margin-bottom: 0;
    }

    label {
      font-size: 12px;
      font-weight: bold;
      color: #1a3a5c;
      margin-bottom: 5px;
    }

    label .req {
      color: #e04040;
      margin-left: 2px;
    }

    input[type="text"],
    input[type="email"] {
      padding: 7px 10px;
      border: 1px solid #bbb;
      border-radius: 3px;
      font-size: 13px;
      font-family: Arial, sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: #1a3a5c;
    }

    .form-footer {
      padding: 14px 20px;
      background: #f0f5fb;
      border-top: 1px solid #d0d8e0;
      display: flex;
      gap: 10px;
    }

    .btn-save {
      padding: 8px 24px;
      background: #f0a500;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-save:hover { background: #d4920a; }

    .btn-cancel {
      padding: 8px 18px;
      background: white;
      color: #555;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 13px;
      text-decoration: none;
    }

    .btn-cancel:hover { background: #f0f0f0; }
  </style>
</head>
<body>

<div class="header">
  <h1>Социальные партнёры</h1>
  <a class="back-btn" href="/">← Назад к списку</a>
</div>

<div class="form-wrap">
  <div class="form-title">
    Редактирование социального партнёра
    <span class="id-badge">ID: {{.ID}}</span>
  </div>

  <form method="POST" action="/edit?id={{.ID}}">
    <div class="form-body">

      <div class="form-group">
        <label>Название организации <span class="req">*</span></label>
        <input type="text" name="organization_name" required value="{{.OrganizationName}}">
      </div>

      <div class="form-group">
        <label>ФИО руководителя</label>
        <input type="text" name="contact_person" value="{{.ContactPerson}}">
      </div>

      <div class="form-group">
        <label>Место нахождение</label>
        <input type="text" name="address" value="{{.Address}}">
      </div>

      <div class="form-group">
        <label>Специфика</label>
        <input type="text" name="partnership_type" value="{{.PartnershipType}}">
      </div>

      <div class="form-row">
        <div class="form-group no-mb">
          <label>Контакты</label>
          <input type="text" name="phone" value="{{.Phone}}">
        </div>
        <div class="form-group no-mb">
          <label>Email</label>
          <input type="email" name="email" value="{{.Email}}">
        </div>
      </div>

      <div class="form-row" style="margin-top:14px; margin-bottom:0;">
        <div class="form-group no-mb">
          <label>Дата заключения меморандума</label>
          <input type="text" name="memo_date" value="{{.MemoDate}}" placeholder="дд.мм.гггг">
        </div>
        <div class="form-group no-mb"></div>
      </div>

    </div>

    <div class="form-footer">
      <button class="btn-save" type="submit">Сохранить изменения</button>
      <a class="btn-cancel" href="/">Отмена</a>
    </div>
  </form>
</div>

</body>
</html>
