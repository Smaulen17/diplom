<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Редактировать партнёра</title>
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0">Редактировать партнёра (ID: {{.ID}})</h3>
    <a class="btn btn-outline-secondary" href="/">Назад</a>
  </div>

  <form method="post" class="card p-3 shadow-sm">
    <div class="mb-3">
      <label class="form-label">Название организации</label>
      <input class="form-control" name="organization_name" required value="{{.OrganizationName}}">
    </div>

    <div class="mb-3">
      <label class="form-label">Тип партнёрства</label>
      <input class="form-control" name="partnership_type" required value="{{.PartnershipType}}">
    </div>

    <div class="mb-3">
      <label class="form-label">Адрес</label>
      <input class="form-control" name="address" value="{{.Address}}">
    </div>

    <div class="mb-3">
      <label class="form-label">Контактное лицо</label>
      <input class="form-control" name="contact_person" value="{{.ContactPerson}}">
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Телефон</label>
        <input class="form-control" name="phone" value="{{.Phone}}">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" name="email" type="email" value="{{.Email}}">
      </div>
    </div>

    <button class="btn btn-primary">Сохранить изменения</button>
  </form>
</div>
</body>
</html>
