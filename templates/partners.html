<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Социальные партнёры</title>
</head>
<body class="bg-light">
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h3 class="m-0">Социальные партнёры колледжа</h3>
      <div class="text-muted">База данных партнёров (Go + SQLite)</div>
    </div>
    <a class="btn btn-primary" href="/add">Добавить</a>
  </div>

  <form class="card p-3 shadow-sm mb-3" method="get" action="/">
    <div class="row g-2 align-items-center">
      <div class="col-md-10">
        <input class="form-control" name="q" placeholder="Поиск по названию / типу / контакту..." value="{{.Query}}">
      </div>
      <div class="col-md-2 d-grid">
        <button class="btn btn-outline-primary">Найти</button>
      </div>
    </div>
  </form>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-striped align-middle m-0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Организация</th>
            <th>Тип</th>
            <th>Контакт</th>
            <th>Телефон</th>
            <th>Email</th>
            <th style="width: 200px;">Действия</th>
          </tr>
        </thead>
        <tbody>
          {{range .Partners}}
          <tr>
            <td>{{.ID}}</td>
            <td>{{.OrganizationName}}</td>
            <td>{{.PartnershipType}}</td>
            <td>{{.ContactPerson}}</td>
            <td>{{.Phone}}</td>
            <td>{{.Email}}</td>
            <td>
              <a class="btn btn-sm btn-outline-secondary" href="/edit?id={{.ID}}">Изменить</a>

              <form method="post" action="/delete" style="display:inline;" onsubmit="return confirm('Удалить партнёра?');">
                <input type="hidden" name="id" value="{{.ID}}">
                <button class="btn btn-sm btn-outline-danger">Удалить</button>
              </form>
            </td>
          </tr>
          {{else}}
          <tr><td colspan="7" class="text-center text-muted py-4">Пока данных нет</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </div>

</div>
</body>
</html>
